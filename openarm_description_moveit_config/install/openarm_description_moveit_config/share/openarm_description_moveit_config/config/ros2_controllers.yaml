# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # left_gripper_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

    # right_gripper_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

    left_side_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_side_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    upper_body_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_arm_controller:
  ros__parameters:
    joints:
      - left_v10_joint1
      - left_v10_joint2
      - left_v10_joint3
      - left_v10_joint4
      - left_v10_joint5
      - left_v10_joint6
      - left_v10_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_arm_controller:
  ros__parameters:
    joints:
      - right_v10_joint1
      - right_v10_joint2
      - right_v10_joint3
      - right_v10_joint4
      - right_v10_joint5
      - right_v10_joint6
      - right_v10_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
left_gripper_controller:
  ros__parameters:
    joints:
      - left_v10_finger_joint1
      # - left_v10_finger_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_gripper_controller:
  ros__parameters:
    joints:
      - right_v10_finger_joint1
      # - right_v10_finger_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
left_side_controller:
  ros__parameters:
    joints:
      - left_v10_joint1
      - left_v10_joint2
      - left_v10_joint3
      - left_v10_joint4
      - left_v10_joint5
      - left_v10_joint6
      - left_v10_joint7
      - left_v10_finger_joint1
      # - left_v10_finger_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
right_side_controller:
  ros__parameters:
    joints:
      - right_v10_joint1
      - right_v10_joint2
      - right_v10_joint3
      - right_v10_joint4
      - right_v10_joint5
      - right_v10_joint6
      - right_v10_joint7
      - right_v10_finger_joint1
      # - right_v10_finger_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
upper_body_controller:
  ros__parameters:
    joints:
      - left_v10_joint1
      - left_v10_joint2
      - left_v10_joint3
      - left_v10_joint4
      - left_v10_joint5
      - left_v10_joint6
      - left_v10_joint7
      - left_v10_finger_joint1
      # - left_v10_finger_joint2
      - right_v10_joint1
      - right_v10_joint2
      - right_v10_joint3
      - right_v10_joint4
      - right_v10_joint5
      - right_v10_joint6
      - right_v10_joint7
      - right_v10_finger_joint1
      # - right_v10_finger_joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
